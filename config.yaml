# --- Roles you are looking for ---
roles:
  use_ai: false
  api_key: ""
  description: "Any software engineering role including frontend, backend,
    full stack, mobile, C++, Java, Python, any programming or coding role,
    software developer, programmer, associate engineer, internships,
    new grad positions, founding engineer roles"
  keywords:
    - "engineer"
    - "developer"
    - "programmer"
    - "software"
    - "associate"
    - "intern"
    - "new grad"
    - "c++"
    - "java"
    - "python"
    - "founding"
    - "full stack"
    - "backend"
    - "frontend"

# --- Output settings ---
output:
  filename: "jobs_output"
  format: "xlsx"
  enrich_linkedin: false    # set to true to auto-find LinkedIn URLs
  sheet_name: "Job Scraper - Live"
  sheet_id: "16JWn9ueySrsHxvMSQ6TxiPIRKdEfggKoC4cdK3GLphg"

