# ============================================================
#  PUBLIC SHEET CONFIG
#  This config runs the public Google Sheet
#  Targets: All software engineering roles, All locations
# ============================================================

roles:
  use_ai: false
  api_key: ""
  description: "Any software engineering role"
  keywords:
    - "engineer"
    - "developer"
    - "programmer"
    - "software"
    - "associate"
    - "intern"
    - "new grad"
    - "c++"
    - "java"
    - "python"
    - "founding"
    - "full stack"
    - "backend"
    - "frontend"

filters:
  locations: []
  experience: []
  job_types: []
  days_old: 0

output:
  filename: "jobs_public"
  format: "xlsx"
  enrich_linkedin: false
  sheet_name: "Job Scraper - Live"
  sheet_id: "16JWn9ueySrsHxvMSQ6TxiPIRKdEfggKoC4cdK3GLphg"

sources:

  # ✅ GREENHOUSE
  - name: "Stripe"
    type: greenhouse
    url: "https://boards.greenhouse.io/stripe"
    enabled: true

  - name: "Airbnb"
    type: greenhouse
    url: "https://boards.greenhouse.io/airbnb"
    enabled: true

  - name: "Robinhood"
    type: greenhouse
    url: "https://boards.greenhouse.io/robinhood"
    enabled: true

  - name: "Figma"
    type: greenhouse
    url: "https://boards.greenhouse.io/figma"
    enabled: true

  - name: "Dropbox"
    type: greenhouse
    url: "https://boards.greenhouse.io/dropbox"
    enabled: true

  - name: "Coinbase"
    type: greenhouse
    url: "https://boards.greenhouse.io/coinbase"
    enabled: true

  # ✅ LEVER
  - name: "Payjoy"
    type: lever
    url: "https://jobs.lever.co/payjoy"
    enabled: true

  # ✅ ASHBY
  - name: "Zapier"
    type: ashby
    url: "https://jobs.ashbyhq.com/zapier"
    enabled: true

  - name: "Perplexity"
    type: ashby
    url: "https://jobs.ashbyhq.com/perplexity"
    enabled: true

  - name: "Supabase"
    type: ashby
    url: "https://jobs.ashbyhq.com/supabase"
    enabled: true

  # ✅ REMOTEOK
  - name: "RemoteOK"
    type: indeed
    url: "https://remoteok.com/api"
