  # ✅ GITHUB LIST
  - name: "Hiring Without Whiteboards"
    type: github_list
    url: "https://raw.githubusercontent.com/poteto/hiring-without-whiteboards/master/README.md"
    enabled: false

  # ✅ YCOMBINATOR
  - name: "YCombinator"
    type: ycombinator
    url: "https://www.workatastartup.com/jobs"
    enabled: true